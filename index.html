<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ladispoli Summer Sport</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:#041b45;
display:flex;
align-items:center;
justify-content:center;
}

/* CONTENITORE */

.container{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* POSTER */

.poster-desktop,
.poster-mobile{
user-select:none;
pointer-events:none;
}

.poster-desktop{
width:100vw;
height:100vh;
object-fit:contain;
display:block;
}

.poster-mobile{
display:none;
width:100vw;
height:100vh;
object-fit:contain;
}

/* FRECCIA */

.guest-arrow{

position:absolute;

top:61%;
left:57%;

transform:translate(-50%,-50%);

width:90px;
height:90px;

border-radius:50%;

background:linear-gradient(135deg,#ff6a00,#ff9800);

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

z-index:100;

box-shadow:
0 0 20px rgba(255,106,0,.6),
0 10px 30px rgba(0,0,0,.35);

transition:.3s ease;

}

.guest-arrow svg{

width:58px;
height:58px;

fill:white;

position:relative;

left:-5px;

}

/* SOCIAL */

.social-icon{

position:absolute;

z-index:200;

transition:.3s ease;

}

.social-icon img{

width:60px;
height:60px;

object-fit:contain;

display:block;

}

/* POSIZIONE DESKTOP */

.instagram-icon{

bottom:-10px;
right:250px;

}

.facebook-icon{

bottom:-8px;
right:200px;

}

/* INDIRIZZO */

.location-link{

position:absolute;

bottom:18px;

left:53%;

transform:none;

z-index:200;

color:white;

text-decoration:none;

font-weight:700;

font-size:clamp(1.1rem,2.1vw,1.5rem);

width:320px;

text-align:center;

line-height:1.4;

font-family:Arial, sans-serif;

}

/* TESTO */

.desktop-address{
display:inline;
}

.mobile-address{
display:none;
}

/* -------------------------------- */
/* MOBILE */
/* -------------------------------- */

@media(max-width:768px){

.poster-desktop{
display:none;
}

.poster-mobile{
display:block;
}

/* FRECCIA */

.guest-arrow{

width:60px;
height:60px;

top:66%;
left:82%;

}

.guest-arrow svg{

width:36px;
height:36px;

left:-3px;

}

/* SOCIAL VICINO LOGO VIOLA */

.social-icon img{

width:46px;
height:46px;

}

.instagram-icon{

bottom:50px;
right:80px;

}

.facebook-icon{

bottom:55px;
right:40px;

}

/* INDIRIZZO SOTTO I SOCIAL */

.location-link{

bottom:15px;

right:20px;

left:auto;

text-align:right;

font-size:.7rem;

display:flex;

flex-direction:column;

align-items:flex-end;

}

/* NASCONDE DESKTOP */

.desktop-address{
display:none;
}

.mobile-address{
display:block;
}

}

</style>

</head>

<body>

<div class="container">

<!-- DESKTOP -->

<img
src="image/Ladispoli corretta.png"
alt="Ladispoli Summer Sport"
class="poster-desktop">

<!-- MOBILE -->

<img
src="image/ladispoli smart 10.png"
alt="Ladispoli Summer Sport Mobile"
class="poster-mobile">

<!-- FRECCIA -->

<a
href="gueststar.html"
class="guest-arrow">

<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24">

<path
d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

</svg>

</a>

<!-- INDIRIZZO -->

<a href="#" class="location-link">

<span class="desktop-address">
Lungomare Regina Elena 148 - Ladispoli (RM)
</span>

<span class="mobile-address">
Ladispoli<br>
Lungomare Regina Elena 148 (RM)
</span>

</a>

<!-- INSTAGRAM -->

<a
href="https://instagram.com/"
target="_blank"
class="social-icon instagram-icon">

<img
src="image/insta-removebg-preview.png"
alt="Instagram">

</a>

<!-- FACEBOOK -->

<a
href="https://facebook.com/"
target="_blank"
class="social-icon facebook-icon">

<img
src="image/facebook.png"
alt="Facebook">

</a>

</div>

</body>

</html>
