<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ladispoli Summer Sport</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Montserrat',sans-serif;
            background:#041b45;
            overflow:hidden;
        }

        /*
        =====================================
        HERO
        =====================================
        */

        .hero{

            position:relative;

            width:100vw;
            height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            background:#041b45;
        }

        /*
        =====================================
        LOCANDINA
        =====================================
        */

        .poster{

            position:relative;

            width:100%;
            height:100%;

            background:url("image/ladispoli.png");

            background-repeat:no-repeat;
            background-position:center;
            background-size:contain;
        }

        /*
        =====================================
        FRECCIA
        =====================================
        */

        .guest-arrow{

            position:absolute;

            /*
            TUOI VALORI
            */

            top:61%;
            left:57%;

            transform:translate(-50%,-50%);

            width:90px;
            height:90px;

            border-radius:50%;

            display:flex;
            align-items:center;
            justify-content:center;

            background:linear-gradient(135deg,#ff6a00,#ff9d00);

            text-decoration:none;

            z-index:20;

            box-shadow:
            0 0 20px rgba(255,106,0,.6),
            0 10px 30px rgba(0,0,0,.35);

            animation:pulse 2s infinite;

            transition:all .3s ease;
        }

        .guest-arrow:hover{

            transform:translate(-50%,-50%) scale(1.12);

            box-shadow:
            0 0 35px rgba(255,140,0,.9),
            0 20px 45px rgba(0,0,0,.4);
        }

        /*
        =====================================
        SVG FRECCIA
        =====================================
        */

        .guest-arrow svg{

            width:58px;
            height:58px;

            fill:white;

            transform:rotate(0deg);

            position:relative;

            left:-5px;
        }

        /*
        =====================================
        ANIMAZIONE
        =====================================
        */

        @keyframes pulse{

            0%{
                transform:translate(-50%,-50%) scale(1);
            }

            50%{
                transform:translate(-50%,-50%) scale(1.06);
            }

            100%{
                transform:translate(-50%,-50%) scale(1);
            }
        }

        /*
        =====================================
        TABLET
        =====================================
        */

        @media(max-width:1024px){

            .guest-arrow{

                width:80px;
                height:80px;
            }

            .guest-arrow svg{

                width:50px;
                height:50px;
            }
        }

        /*
        =====================================
        SMARTPHONE
        =====================================
        */

        @media(max-width:768px){

            body{
                overflow:auto;
            }

            .poster{

                background-size:contain;
                background-position:center top;
            }

            .guest-arrow{

                /*
                STESSA POSIZIONE
                ANCHE SU MOBILE
                */

                top:61%;
                left:57%;

                width:65px;
                height:65px;

                box-shadow:
                0 0 15px rgba(255,106,0,.6),
                0 8px 20px rgba(0,0,0,.35);
            }

            .guest-arrow svg{

                width:38px;
                height:38px;

                left:-3px;
            }
        }

        /*
        =====================================
        SMARTPHONE PICCOLI
        =====================================
        */

        @media(max-width:480px){

            .guest-arrow{

                width:58px;
                height:58px;
            }

            .guest-arrow svg{

                width:34px;
                height:34px;

                left:-2px;
            }
        }

    </style>

</head>

<body>

    <section class="hero">

        <div class="poster">

            <!-- FRECCIA CLICCABILE -->

            <a href="gueststar.html" class="guest-arrow">

                <svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24">

                    <path
                        d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

                </svg>

            </a>

        </div>

    </section>

</body>

</html>
