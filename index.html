<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ladispoli Summer Sport</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

img{
display:block;
width:100%;
height:100%;
object-fit:contain;
}

body{

background:#041b45;

min-height:100dvh;

display:flex;
align-items:center;
justify-content:center;

font-family:'Montserrat',sans-serif;

overflow-x:hidden;
}

/* AREA LOCANDINA */

.poster-wrapper{

position:relative;

width:100%;
max-width:1200px;

height:100dvh;

display:flex;
align-items:center;
justify-content:center;
}

/* LOCANDINE */

.poster-desktop,
.poster-mobile{

position:absolute;

inset:0;

user-select:none;
pointer-events:none;
}

.poster-mobile{
display:none;
}

/* FRECCIA */

.guest-arrow{

position:absolute;

/* POSIZIONE PRECISA SULLA LOCANDINA */

top:60%;
left:56%;

transform:translate(-50%,-50%);

width:clamp(55px,7vw,90px);
height:clamp(55px,7vw,90px);

border-radius:50%;

background:linear-gradient(135deg,#ff6a00,#ff9800);

display:flex;
align-items:center;
justify-content:center;

z-index:50;

text-decoration:none;

box-shadow:
0 0 20px rgba(255,106,0,.6),
0 10px 30px rgba(0,0,0,.35);

animation:pulse 2s infinite;

transition:.3s ease;
}

.guest-arrow:hover{
transform:translate(-50%,-50%) scale(1.1);
}

.guest-arrow svg{

width:60%;
height:60%;

fill:white;

position:relative;
left:-3px;
}

/* SOCIAL */

.social-icon{

position:absolute;

z-index:100;

transition:.3s ease;
}

.social-icon img{

width:55px;
height:55px;

filter:drop-shadow(0 0 14px rgba(255,106,0,.4));
}

.social-icon:hover{
transform:scale(1.08);
}

.instagram-icon{

bottom:10px;
right:120px;
}

.facebook-icon{

bottom:10px;
right:60px;
}

/* LOCATION */

.location-link{

position:absolute;

bottom:70px;

left:58%;

color:white;

text-decoration:none;

font-weight:700;

font-size:.85rem;
}

/* ANIMAZIONE */

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
}

50%{
transform:translate(-50%,-50%) scale(1.05);
}

100%{
transform:translate(-50%,-50%) scale(1);
}

}

/* TABLET */

@media(max-width:1024px){

.guest-arrow{
width:70px;
height:70px;
}

.social-icon img{
width:48px;
height:48px;
}

}

/* MOBILE */

@media(max-width:768px){

.poster-desktop{
display:none;
}

.poster-mobile{
display:block;
}

/* freccia ancorata */

.guest-arrow{

top:64%;
left:74%;

width:60px;
height:60px;
}

/* social */

.instagram-icon{

bottom:3%;
right:14%;
}

.facebook-icon{

bottom:3%;
right:6%;
}

.social-icon img{

width:42px;
height:42px;
}

/* location */

.location-link{

left:50%;

transform:translateX(-50%);

bottom:14px;

width:85%;

text-align:center;

font-size:.8rem;
}

}

/* smartphone piccoli */

@media(max-width:480px){

.guest-arrow{

width:55px;
height:55px;
}

}

</style>

</head>

<body>

<div class="poster-wrapper">

<img src="image/ladispoli3.png"
alt="Ladispoli Summer Sport"
class="poster-desktop">

<img src="image/ladispoli smart1.png"
alt="Ladispoli Summer Sport Mobile"
class="poster-mobile">

<a href="gueststar.html" class="guest-arrow">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

<path d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

</svg>

</a>

<a href="https://maps.google.com/?q=Lungomare+Regina+Elena+20+Ladispoli"
target="_blank"
class="location-link">

Ladispoli - Lungomare Regina Elena - RM

</a>

<a href="https://instagram.com/"
target="_blank"
class="social-icon instagram-icon">

<img src="image/insta-removebg-preview.png" alt="Instagram">

</a>

<a href="https://facebook.com/"
target="_blank"
class="social-icon facebook-icon">

<img src="image/facebook.png" alt="Facebook">

</a>

</div>

</body>

</html>
