<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Double Ex</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.container{
position:relative;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.logo{
width:320px;
}

/* SOCIAL + INDIRIZZO */

.bottom-bar{
position:absolute;
bottom:30px;
right:40px;
display:flex;
align-items:center;
gap:15px;
}

/* SOCIAL */

.social{
display:flex;
gap:12px;
}

.social img{
width:28px;
height:28px;
}

/* INDIRIZZO */

.address{
color:white;
font-size:16px;
text-decoration:none;
}

/* MOBILE */

@media (max-width:768px){

.container{
height:100dvh;
}

.logo{
width:220px;
}

.bottom-bar{
position:absolute;
bottom:15px;
right:15px;
gap:10px;
}

.social img{
width:24px;
height:24px;
}

.address{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<div class="bottom-bar">

<div class="social">

<a href="https://instagram.com" target="_blank">
<img src="instagram.png">
</a>

<a href="https://facebook.com" target="_blank">
<img src="facebook.png">
</a>

</div>

<a class="address" href="https://maps.google.com/?q=Ladispoli">
Ladispoli
</a>

</div>

</div>

</body>
</html>
