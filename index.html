<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ladispoli Summer Sport</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background: #041b45;
        }

        .hero {
            position: relative;

            width: 100vw;
            height: 100vh;

            background:
                #041b45 url("image/ladispoli web1.png");

            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /*
        ======================================
        FRECCIA GUEST STAR
        ======================================
        */

        .guest-arrow {
            position: absolute;

            /*
            POSIZIONE FRECCIA
            */
            top: 70%;
            left: 74%;

            transform: translate(-50%, -50%);

            width: 90px;
            height: 90px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;

            text-decoration: none;

            z-index: 20;

            background: linear-gradient(135deg, #ff6a00, #ff9500);

            box-shadow:
                0 0 20px rgba(255, 106, 0, .6),
                0 0 40px rgba(255, 106, 0, .4),
                0 15px 40px rgba(0, 0, 0, .4);

            transition: all .3s ease;

            animation: pulse 2s infinite;
        }

        .guest-arrow svg {
            width: 42px;
            height: 42px;

            fill: white;

            transform: rotate(180deg);
        }

        .guest-arrow:hover {

            transform: translate(-50%, -50%) scale(1.15);

            box-shadow:
                0 0 30px rgba(255, 136, 0, .9),
                0 0 60px rgba(255, 136, 0, .5),
                0 20px 50px rgba(0, 0, 0, .5);
        }

        @keyframes pulse {

            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.08);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /*
        ======================================
        MOBILE
        ======================================
        */

        @media(max-width:768px) {

            body {
                overflow: auto;
            }

            .hero {

                height: 100vh;

                background-size: cover;
                background-position: center top;
            }

            .guest-arrow {

                top: 57%;
                left: 68%;

                width: 70px;
                height: 70px;
            }

            .guest-arrow svg {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">

        <!-- FRECCIA CLICCABILE -->

        <a href="gueststar.html" class="guest-arrow">

            <!-- ICONA SVG -->

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                <path
                    d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z" />

            </svg>

        </a>

    </section>

</body>

</html>
