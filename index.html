<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ladispoli Summer Sport</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
width:100%;
height:100vh;
background:#041b45;
font-family:'Montserrat',sans-serif;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* CONTAINER */

.container{
position:relative;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* POSTER */

.poster-desktop,
.poster-mobile{
width:100%;
height:100%;
object-fit:contain;
user-select:none;
pointer-events:none;
}

.poster-desktop{
display:block;
}

.poster-mobile{
display:none;
}

/* FRECCIA DESKTOP */

.guest-arrow{
position:absolute;
top:58%;
left:55%;
width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(135deg,#ff6a00,#ff2d00);
display:flex;
align-items:center;
justify-content:center;
box-shadow:
0 0 20px rgba(255,106,0,.6),
0 10px 30px rgba(0,0,0,.35);
animation:pulse 2s infinite;
z-index:200;
}

.guest-arrow svg{
width:40px;
height:40px;
fill:white;
position:relative;
left:-4px;
}

/* SOCIAL */

.social-icon{
position:absolute;
z-index:200;
transition:.3s ease;
}

.social-icon img{
width:60px;
height:60px;
object-fit:contain;
filter:drop-shadow(0 0 14px rgba(255,106,0,.4));
}

/* SOCIAL SOTTO "SEGUICI SU" */

.instagram-icon{
bottom:-7px;
right:290px;
}

.facebook-icon{
bottom:-5px;
right:210px;
}

/* INDIRIZZO CENTRO MAP */

.location-link{
position:absolute;
bottom:25px;
left:68%;
transform:translateX(-50%);
z-index:200;
color:white;
text-decoration:none;
font-size:1.5rem;
line-height:1.4;
font-family:Arial,sans-serif;
text-align:center;
}

.desktop-address{
display:inline;
}

.mobile-address{
display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

.poster-desktop{
display:none;
}

.poster-mobile{
display:block;
}

/* SOCIAL VICINO LOGO VIOLA */

.instagram-icon{
bottom:20px;
right:90px;
}

.facebook-icon{
bottom:20px;
right:35px;
}

.social-icon img{
width:42px;
height:42px;
}

/* INDIRIZZO SOTTO SOCIAL */

.location-link{
bottom:10px;
right:20px;
left:auto;
transform:none;
font-size:.8rem;
text-align:right;
display:flex;
flex-direction:column;
align-items:flex-end;
}

.desktop-address{
display:none;
}

.mobile-address{
display:block;
}

.guest-arrow{
top:66%;
left:82%;
width:55px;
height:55px;
}

.guest-arrow svg{
width:30px;
height:30px;
}

}

/* ANIMAZIONE */

@keyframes pulse{

0%{transform:scale(1);}

50%{transform:scale(1.08);}

100%{transform:scale(1);}

}

</style>

</head>

<body>

<div class="container">

<!-- POSTER DESKTOP -->

<img src="image/Ladispoli corretta.png"
alt="Ladispoli Summer Sport"
class="poster-desktop">

<!-- POSTER MOBILE -->

<img src="image/ladispoli smart 10.png"
alt="Ladispoli Summer Sport Mobile"
class="poster-mobile">

<!-- FRECCIA -->

<a href="gueststar.html" class="guest-arrow">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

<path d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

</svg>

</a>

<!-- INDIRIZZO -->

<a href="https://www.google.com/maps?q=Lungomare+Regina+Elena+148+Ladispoli"
class="location-link">

<span class="desktop-address">
Lungomare Regina Elena 148 - Ladispoli (RM)
</span>

<span class="mobile-address">
Ladispoli<br>
Lungomare Regina Elena 148 (RM)
</span>

</a>

<!-- INSTAGRAM -->

<a href="https://www.instagram.com/ladispoli_official/?hl=it/"
target="_blank"
class="social-icon instagram-icon">

<img src="image/insta-removebg-preview.png" alt="Instagram">

</a>

<!-- FACEBOOK -->

<a href="https://www.facebook.com/comuneladispoli/?locale=it_IT/"
target="_blank"
class="social-icon facebook-icon">

<img src="image/facebook.png" alt="Facebook">

</a>

</div>

</body>
</html>
