<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Ladispoli Summer Sport</title>

    <!-- FONT -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            width:100vw;
            height:100vh;

            overflow:hidden;

            background:#041b45;

            font-family:'Montserrat',sans-serif;

            display:flex;
            align-items:center;
            justify-content:center;
        }

        /*
        =====================================
        CONTENITORE GENERALE
        =====================================
        */

        .container{

            position:relative;

            width:100vw;
            height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            overflow:hidden;
        }

        /*
        =====================================
        LOCANDINE
        =====================================
        */

        .poster-desktop,
        .poster-mobile{

            user-select:none;

            pointer-events:none;
        }

        /*
        =====================================
        LOCANDINA DESKTOP
        =====================================
        */

        .poster-desktop{

            width:100%;
            height:100%;

            object-fit:contain;

            display:block;
        }

        /*
        =====================================
        LOCANDINA MOBILE
        =====================================
        */

        .poster-mobile{

            display:none;

            width:100%;
            height:100%;

            object-fit:contain;
        }

        /*
        =====================================
        FRECCIA
        =====================================
        */

        .guest-arrow{

            position:absolute;

            top:61%;
            left:57%;

            transform:translate(-50%,-50%);

            width:90px;
            height:90px;

            border-radius:50%;

            background:linear-gradient(135deg,#ff6a00,#ff9800);

            display:flex;
            align-items:center;
            justify-content:center;

            text-decoration:none;

            z-index:100;

            box-shadow:
            0 0 20px rgba(255,106,0,.6),
            0 10px 30px rgba(0,0,0,.35);

            transition:.3s ease;

            animation:pulse 2s infinite;
        }

        .guest-arrow:hover{

            transform:translate(-50%,-50%) scale(1.12);

            box-shadow:
            0 0 35px rgba(255,140,0,.9),
            0 20px 45px rgba(0,0,0,.45);
        }

        /*
        =====================================
        ICONA FRECCIA
        =====================================
        */

        .guest-arrow svg{

            width:58px;
            height:58px;

            fill:white;

            position:relative;

            left:-5px;
        }

        /*
        =====================================
        SOCIAL CLICKABLE
        =====================================
        */

        .social-icon{

            position:absolute;

            z-index:200;

            transition:.3s ease;
        }

       .social-icon img{

    width:55px;
    height:55px;

    object-fit:contain;

    display:block;

    aspect-ratio:1/1;

    filter:
    drop-shadow(0 0 14px rgba(255,106,0,.4));
}
        /*
        =====================================
        INSTAGRAM DESKTOP
        =====================================
        */

        .instagram-icon{

            bottom:-6px;
            right:250px;
        }

        /*
        =====================================
        FACEBOOK DESKTOP
        =====================================
        */

        .facebook-icon{

            bottom:-1.5px;
            right:200px;
        }

        /*
        =====================================
        ANIMAZIONE
        =====================================
        */

        @keyframes pulse{

            0%{
                transform:translate(-50%,-50%) scale(1);
            }

            50%{
                transform:translate(-50%,-50%) scale(1.06);
            }

            100%{
                transform:translate(-50%,-50%) scale(1);
            }
        }

        /*
        =====================================
        TABLET
        =====================================
        */

        @media(max-width:1024px){

            .guest-arrow{

                width:75px;
                height:75px;
            }

            .guest-arrow svg{

                width:48px;
                height:48px;
            }
        }

        /*
        =====================================
        SMARTPHONE
        =====================================
        */

        @media(max-width:768px){

            body{
                overflow:hidden;
            }

            /*
            NASCONDE DESKTOP
            */

            .poster-desktop{
                display:none;
            }

            /*
            MOSTRA MOBILE
            */

            .poster-mobile{
                display:block;
            }

            /*
            FRECCIA MOBILE
            */

            .guest-arrow{

                width:60px;
                height:60px;

                top:63%;
                left:74%;
            }

            .guest-arrow svg{

                width:36px;
                height:36px;

                left:-3px;
            }

            /*
            SOCIAL MOBILE
            */

            .social-icon img{

                width:42px;
                height:42px;
            }

            .instagram-icon{

                bottom:-4px;
                right:52px;
            }

            .facebook-icon{

                bottom:-4px;
                right:6px;
            }
        }

        /*
        =====================================
        SMARTPHONE PICCOLI
        =====================================
        */

        @media(max-width:480px){

            .guest-arrow{

                width:55px;
                height:55px;

                top:63%;
                left:74%;
            }

            .guest-arrow svg{

                width:32px;
                height:32px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!--
        =====================================
        LOCANDINA DESKTOP
        =====================================
        -->

        <img
            src="image/ladispoli3.png"
            alt="Ladispoli Summer Sport"
            class="poster-desktop">

        <!--
        =====================================
        LOCANDINA SMARTPHONE
        =====================================
        -->

        <img
            src="image/ladispoli_smartphone.png"
            alt="Ladispoli Summer Sport Mobile"
            class="poster-mobile">

        <!--
        =====================================
        FRECCIA CLICCABILE
        =====================================
        -->

        <a
            href="gueststar.html"
            class="guest-arrow">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24">

                <path
                    d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

            </svg>

        </a>

        <!--
        =====================================
        INSTAGRAM
        =====================================
        -->

        <a
            href="https://instagram.com/"
            target="_blank"
            class="social-icon instagram-icon">

            <img
                src="image/insta-removebg-preview.png"
                alt="Instagram">

        </a>

        <!--
        =====================================
        FACEBOOK
        =====================================
        -->

        <a
            href="https://facebook.com/"
            target="_blank"
            class="social-icon facebook-icon">

            <img
                src="image/facebook.png"
                alt="Facebook">

        </a>

    </div>

    <!-- COOKIE BANNER -->

    <div id="cookie-banner">

      <div class="cookie-box">

        <p>
          Questo sito utilizza esclusivamente cookie tecnici
          necessari al corretto funzionamento della piattaforma.
          Nessun dato viene condiviso con terze parti.
        </p>

        <div class="cookie-buttons">

          <button id="accept-cookies" class="accept-btn">
            ✓ Accetta
          </button>

          <button id="reject-cookies" class="reject-btn">
            ✕ Rifiuta
          </button>

        </div>

      </div>

    </div>

<style>

/* COOKIE BANNER */

#cookie-banner{

  position:fixed;

  bottom:25px;
  left:25px;
  right:25px;

  z-index:99999;

  display:none;

  animation:fadeUp .5s ease;
}

/* BOX */

.cookie-box{

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(14px);

  border-radius:24px;

  padding:22px;

  box-shadow:0 15px 40px rgba(0,0,0,.25);

  display:flex;

  align-items:center;
  justify-content:space-between;

  gap:20px;

  flex-wrap:wrap;
}

/* TESTO */

.cookie-box p{

  flex:1;

  color:#041b45;

  font-size:.95rem;

  line-height:1.6;

  font-weight:500;
}

/* BOTTONI */

.cookie-buttons{

  display:flex;

  gap:12px;
}

.cookie-buttons button{

  border:none;

  padding:14px 26px;

  border-radius:16px;

  cursor:pointer;

  font-weight:700;

  font-size:.95rem;

  transition:.3s ease;

  font-family:'Montserrat',sans-serif;

  display:flex;
  align-items:center;
  justify-content:center;

  gap:8px;

  min-width:140px;
}

.cookie-buttons button:hover{
  transform:translateY(-2px);
}

/* ACCETTA */

.accept-btn{

  background:linear-gradient(
  90deg,
  #ff6a00,
  #ffb300);

  color:white;

  box-shadow:0 8px 20px rgba(255,106,0,.35);
}

/* RIFIUTA */

.reject-btn{

  background:#eef2f8;

  color:#041b45;

  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* ANIMAZIONE */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MOBILE */

@media(max-width:768px){

  #cookie-banner{
    left:15px;
    right:15px;
    bottom:15px;
  }

  .cookie-box{

    flex-direction:column;

    align-items:flex-start;
  }

  .cookie-buttons{

    width:100%;
  }

  .cookie-buttons button{

    flex:1;
  }

}

</style>

<script>

/* ELEMENTI */

const cookieBanner =
document.getElementById('cookie-banner');

const acceptBtn =
document.getElementById('accept-cookies');

const rejectBtn =
document.getElementById('reject-cookies');

/* MOSTRA BANNER */

if(!localStorage.getItem('cookieChoice')){

  cookieBanner.style.display = 'block';
}

/* ACCETTA */

acceptBtn.addEventListener('click', () => {

  localStorage.setItem(
    'cookieChoice',
    'accepted'
  );

  cookieBanner.style.display = 'none';

});

/* RIFIUTA */

rejectBtn.addEventListener('click', () => {

  localStorage.setItem(
    'cookieChoice',
    'rejected'
  );

  cookieBanner.style.display = 'none';

});

</script>

</body>

</html>
