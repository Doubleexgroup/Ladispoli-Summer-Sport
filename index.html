<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evento</title>

<style>

/* PAGINA */

body{
margin:0;
background:black;
font-family:Arial, Helvetica, sans-serif;
}

/* CONTENITORE LOCANDINA */

.container{
position:relative;
width:100%;
max-width:1400px;
margin:auto;
}

/* LOCANDINA */

.poster{
width:100%;
height:auto;
display:block;
}

/* FRECCIA */

.arrow{
position:absolute;
right:6%;
top:50%;
transform:translateY(-50%);
width:45px;
cursor:pointer;
}

/* INDIRIZZO DESKTOP */

.address-desktop{
position:absolute;
bottom:12%;
right:6%;
display:none;
}

.address-desktop a{
color:#1e90ff;
font-weight:bold;
text-decoration:none;
font-size:16px;
}

/* SOCIAL DESKTOP */

.social-desktop{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
display:none;
}

.social-desktop h3{
margin-bottom:10px;
}

.icons{
display:flex;
gap:18px;
justify-content:center;
}

.icons img{
width:34px;
}

/* MOBILE */

@media(max-width:768px){

.container{
width:100%;
max-width:100%;
}

/* freccia allineata con le nostre star */

.arrow{
right:5%;
top:50%;
width:40px;
}

/* indirizzo mobile */

.address-mobile{
position:absolute;
bottom:14%;
right:6%;
text-align:right;
}

.address-mobile a{
color:white;
text-decoration:none;
font-size:14px;
}

/* social sotto indirizzo */

.social-mobile{
margin-top:8px;
display:flex;
gap:12px;
justify-content:flex-end;
}

.social-mobile img{
width:26px;
}

}

/* DESKTOP */

@media(min-width:769px){

.social-desktop{
display:block;
}

.address-desktop{
display:block;
}

.address-mobile{
display:none;
}

}

</style>

</head>

<body>

<div class="container">

<!-- CAMBIA SOLO QUESTO -->
<img src="image/ladispoli3.png" class="poster">

<!-- FRECCIA -->
<a href="#">
<img src="freccia.png" class="arrow">
</a>

<!-- INDIRIZZO DESKTOP (CAMBIA QUI) -->

<div class="address-desktop">
<a href="https://maps.google.com/?q=Via+Roma+1" target="_blank">
📍 Lungomare Regina Elena 148 - Ladispoli - RM
</a>
</div>

<!-- SOCIAL DESKTOP -->

<div class="social-desktop">

<h3>Seguici</h3>

<div class="icons">

<a href="#">
<img src="instagram.png">
</a>

<a href="#">
<img src="tiktok.png">
</a>

<a href="#">
<img src="facebook.png">
</a>

</div>

</div>

<!-- MOBILE -->

<div class="address-mobile">

<a href="https://maps.google.com/?q=Via+Roma+1" target="_blank">
📍 Lungomare Regina Elena 148 - Ladispoli - RM
</a>

<div class="social-mobile">

<a href="#">
<img src="instagram.png">
</a>

<a href="#">
<img src="tiktok.png">
</a>

<a href="#">
<img src="facebook.png">
</a>

</div>

</div>

</div>

</body>
</html>
