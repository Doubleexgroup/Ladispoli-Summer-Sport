<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Evento</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

/* contenitore */

.container{
position:relative;
width:100%;
max-width:1200px;
margin:auto;
}

/* locandina */

.poster{
width:100%;
height:auto;
display:block;
}

/* freccia */

.arrow{
position:absolute;
right:6%;
top:52%;
width:50px;
cursor:pointer;
}

/* indirizzo desktop */

.address-desktop{
position:absolute;
bottom:13%;
right:7%;
display:none;
}

.address-desktop a{
color:#1e90ff;
font-weight:bold;
text-decoration:none;
font-size:16px;
}

/* social desktop */

.social-desktop{
position:absolute;
bottom:7%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
display:none;
}

.social-icons{
margin-top:10px;
display:flex;
gap:20px;
justify-content:center;
}

.social-icons img{
width:35px;
}

/* mobile */

@media (max-width:768px){

.container{
width:100%;
}

.arrow{
top:52%;
right:5%;
width:42px;
}

/* indirizzo mobile */

.address-mobile{
position:absolute;
bottom:15%;
right:6%;
text-align:right;
}

.address-mobile a{
color:white;
text-decoration:none;
font-size:14px;
}

/* social mobile */

.social-mobile{
margin-top:8px;
display:flex;
gap:12px;
justify-content:flex-end;
}

.social-mobile img{
width:26px;
}

}

/* desktop */

@media (min-width:769px){

.address-desktop{
display:block;
}

.social-desktop{
display:block;
}

.address-mobile{
display:none;
}

}

</style>

</head>

<body>

<div class="container">

<!-- CAMBIA SOLO QUESTO -->

<img src="image/ladispoli3.png" class="poster">

<!-- FRECCIA -->

<a href="#">
<img src="freccia.png" class="arrow">
</a>

<!-- INDIRIZZO DESKTOP -->

<div class="address-desktop">

<a href="https://maps.google.com/?q=Lungomare+Regina Elena+148+Ladispoli" target="_blank">

📍 Lungomare Regina Elena, 148 - Ladispoli - RM

</a>

</div>

<!-- SOCIAL DESKTOP -->

<div class="social-desktop">

<div>Seguici</div>

<div class="social-icons">

<a href="#">
<img src="instagram.png">
</a>

<a href="#">
<img src="tiktok.png">
</a>

<a href="#">
<img src="facebook.png">
</a>

</div>

</div>

<!-- MOBILE -->

<div class="address-mobile">

<a href="https://maps.google.com/?q=Lungomare+Regina Elena+148+Ladispoli" target="_blank">

📍 Lungomare Regina Elena, 148 - Ladispoli - RM

</a>

<div class="social-mobile">

<a href="#">
<img src="instagram.png">
</a>

<a href="#">
<img src="tiktok.png">
</a>

<a href="#">
<img src="facebook.png">
</a>

</div>

</div>

</div>

</body>
</html>
