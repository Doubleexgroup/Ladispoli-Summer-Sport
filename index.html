<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Ladispoli Summer Sport</title>

    <!-- FONT -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            width:100vw;
            height:100vh;

            overflow:hidden;

            background:#041b45;

            font-family:'Montserrat',sans-serif;

            display:flex;
            align-items:center;
            justify-content:center;
        }

        /*
        =====================================
        CONTENITORE GENERALE
        =====================================
        */

        .container{

            position:relative;

            width:100vw;
            height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            overflow:hidden;
        }

        /*
        =====================================
        LOCANDINA
        =====================================
        */

        .poster{

            width:100%;
            height:100%;

            object-fit:contain;

            user-select:none;

            pointer-events:none;
        }

        /*
        =====================================
        FRECCIA
        =====================================
        */

        .guest-arrow{

            position:absolute;

            /*
            POSIZIONE FRECCIA
            */

            top:61%;
            left:57%;

            transform:translate(-50%,-50%);

            width:90px;
            height:90px;

            border-radius:50%;

            background:linear-gradient(135deg,#ff6a00,#ff9800);

            display:flex;
            align-items:center;
            justify-content:center;

            text-decoration:none;

            z-index:100;

            box-shadow:
            0 0 20px rgba(255,106,0,.6),
            0 10px 30px rgba(0,0,0,.35);

            transition:.3s ease;

            animation:pulse 2s infinite;
        }

        .guest-arrow:hover{

            transform:translate(-50%,-50%) scale(1.12);

            box-shadow:
            0 0 35px rgba(255,140,0,.9),
            0 20px 45px rgba(0,0,0,.45);
        }

        /*
        =====================================
        ICONA FRECCIA
        =====================================
        */

        .guest-arrow svg{

            width:58px;
            height:58px;

            fill:white;

            position:relative;

            left:-5px;

            transform:rotate(0deg);
        }

        /*
        =====================================
        ANIMAZIONE
        =====================================
        */

        @keyframes pulse{

            0%{
                transform:translate(-50%,-50%) scale(1);
            }

            50%{
                transform:translate(-50%,-50%) scale(1.06);
            }

            100%{
                transform:translate(-50%,-50%) scale(1);
            }
        }

        /*
        =====================================
        TABLET
        =====================================
        */

        @media(max-width:1024px){

            .guest-arrow{

                width:75px;
                height:75px;
            }

            .guest-arrow svg{

                width:48px;
                height:48px;
            }
        }

        /*
        =====================================
        SMARTPHONE
        =====================================
        */

        @media(max-width:768px){

            body{
                overflow:auto;
            }

            .container{

                width:100vw;
                height:auto;

                min-height:100vh;
            }

            .poster{

                width:100%;
                height:auto;
            }

            .guest-arrow{

                width:60px;
                height:60px;

                /*
                POSIZIONE MOBILE
                */

                top:56%;
                left:67%;
            }

            .guest-arrow svg{

                width:36px;
                height:36px;

                left:-3px;
            }
        }

        /*
        =====================================
        SMARTPHONE PICCOLI
        =====================================
        */

        @media(max-width:480px){

            .guest-arrow{

                width:55px;
                height:55px;

                top:55%;
                left:68%;
            }

            .guest-arrow svg{

                width:32px;
                height:32px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!--
        =====================================
        INSERISCI QUI LA TUA LOCANDINA
        =====================================
        -->

        <img
            src="image/ladispoli.png"
            alt="Ladispoli Summer Sport"
            class="poster">

        <!--
        =====================================
        FRECCIA CLICCABILE
        =====================================
        -->

        <a
            href="gueststar.html"
            class="guest-arrow">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24">

                <path
                    d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

            </svg>

        </a>

    </div>

</body>

</html>
