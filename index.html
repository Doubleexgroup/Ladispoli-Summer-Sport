<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ladispoli Summer Sport</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      overflow-x:hidden;
      background:#041b45;
    }

    .hero{
      position:relative;
      width:100%;
      min-height:100vh;

      /* INSERISCI QUI LA TUA LOCANDINA */
      background:url('image/ladispoli web1.png') center center no-repeat;
      background-size:contain;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.15);
    }

    .content{
      position:relative;
      z-index:2;
      width:100%;
      max-width:1400px;
      height:100vh;
    }

    /*
      POSIZIONE CTA GUEST STAR
      Modifica top/left per allinearla perfettamente
      sopra la scritta presente nella locandina
    */

    .gueststar-button{
      position:absolute;
      top:58%;
      left:39%;

      text-decoration:none;

      background:linear-gradient(90deg,#ff6a00,#ffb300);
      color:white;

      padding:18px 34px;

      border-radius:18px;

      font-size:1.4rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;

      box-shadow:0 10px 30px rgba(0,0,0,0.35);

      transition:all .3s ease;
    }

    .gueststar-button:hover{
      transform:translateY(-5px) scale(1.03);
      box-shadow:0 14px 40px rgba(0,0,0,0.45);
    }

    @media(max-width:768px){

      .hero{
        background-position:center top;
      }

      .gueststar-button{
        top:64%;
        left:50%;
        transform:translateX(-50%);
        width:85%;
        text-align:center;
        font-size:1rem;
        padding:16px 20px;
      }

      .gueststar-button:hover{
        transform:translateX(-50%) translateY(-3px);
      }
    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="overlay"></div>

    <div class="content">

      <a href="gueststar.html" class="gueststar-button">
        Vieni a scoprire le nostre Guest Star
      </a>

    </div>

  </section>

</body>
</html>
