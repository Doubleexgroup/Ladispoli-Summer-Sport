<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ladispoli Summer Sport</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:#041b45;
      overflow-x:hidden;
      color:white;
    }

    a{
      text-decoration:none;
    }

    /* HERO */

    .hero{

      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      padding:40px 20px;

      position:relative;

      background:
      radial-gradient(circle at top left,
      rgba(255,106,0,.25),
      transparent 30%),

      radial-gradient(circle at bottom right,
      rgba(255,179,0,.2),
      transparent 30%),

      linear-gradient(
      135deg,
      #041b45 0%,
      #08265f 45%,
      #041b45 100%);
    }

    /* LOCANDINA */

    .poster-container{

      position:relative;

      width:100%;
      max-width:1400px;

      margin:auto;
    }

    .poster{

      width:100%;

      display:block;

      border-radius:24px;

      box-shadow:0 25px 60px rgba(0,0,0,.45);
    }

    /* SOCIAL */

    .social-icon{

      position:absolute;

      z-index:10;

      transition:.3s ease;
    }

    .social-icon img{

      width:68px;
      height:auto;

      display:block;

      filter:
      drop-shadow(0 0 14px rgba(255,106,0,.4));
    }

    .social-icon:hover{

      transform:
      scale(1.08)
      translateY(-3px);
    }

    /* INSTAGRAM */

    .instagram-icon{

      bottom:20px;
      right:95px;
    }

    /* FACEBOOK */

    .facebook-icon{

      bottom:20px;
      right:18px;
    }

    /* BUTTON GUEST */

    .guest-btn{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%, -50%);

      padding:18px 34px;

      border-radius:18px;

      background:linear-gradient(
      90deg,
      #ff6a00,
      #ffb300);

      color:white;

      font-weight:800;

      font-size:1rem;

      box-shadow:0 12px 35px rgba(255,106,0,.35);

      transition:.3s ease;
    }

    .guest-btn:hover{

      transform:
      translate(-50%, -50%)
      scale(1.05);
    }

    /* COOKIE */

    #cookie-banner{

      position:fixed;

      bottom:25px;
      left:25px;
      right:25px;

      z-index:99999;

      display:none;

      animation:fadeUp .5s ease;
    }

    .cookie-box{

      background:rgba(255,255,255,.96);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:22px;

      box-shadow:0 15px 40px rgba(0,0,0,.25);

      display:flex;

      align-items:center;
      justify-content:space-between;

      gap:20px;

      flex-wrap:wrap;
    }

    .cookie-box p{

      flex:1;

      color:#041b45;

      font-size:.95rem;

      line-height:1.6;

      font-weight:500;
    }

    .cookie-buttons{

      display:flex;

      gap:12px;
    }

    .cookie-buttons button{

      border:none;

      padding:14px 26px;

      border-radius:16px;

      cursor:pointer;

      font-weight:700;

      font-size:.95rem;

      transition:.3s ease;

      font-family:'Montserrat',sans-serif;

      display:flex;
      align-items:center;
      justify-content:center;

      gap:8px;

      min-width:140px;
    }

    .cookie-buttons button:hover{
      transform:translateY(-2px);
    }

    .accept-btn{

      background:linear-gradient(
      90deg,
      #ff6a00,
      #ffb300);

      color:white;

      box-shadow:0 8px 20px rgba(255,106,0,.35);
    }

    .reject-btn{

      background:#eef2f8;

      color:#041b45;

      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .hero{
        min-height:auto;
        padding:20px 10px 40px;
      }

      .poster-container{
        max-width:100%;
      }

      .poster{
        border-radius:16px;
      }

      .social-icon img{
        width:42px;
      }

      .instagram-icon{
        bottom:8px;
        right:52px;
      }

      .facebook-icon{
        bottom:8px;
        right:6px;
      }

      .guest-btn{

        padding:12px 20px;

        font-size:.78rem;

        border-radius:14px;

        width:70%;

        text-align:center;
      }

      #cookie-banner{
        left:15px;
        right:15px;
        bottom:15px;
      }

      .cookie-box{

        flex-direction:column;

        align-items:flex-start;
      }

      .cookie-buttons{
        width:100%;
      }

      .cookie-buttons button{
        flex:1;
      }

    }

  </style>

</head>

<body>

  <!-- HERO -->

  <section class="hero">

    <div class="poster-container">

      <!-- LOCANDINA -->

      <img src="image/ladispoli2.png"
           alt="Ladispoli Summer Sport"
           class="poster">

      <!-- BOTTONE GUEST -->

      <a href="gueststar.html"
         class="guest-btn">
         SCOPRI LE GUEST STAR
      </a>

      <!-- INSTAGRAM -->

      <a href="https://instagram.com/"
         target="_blank"
         class="social-icon instagram-icon">

        <img src="image/instagram.png"
             alt="Instagram">

      </a>

      <!-- FACEBOOK -->

      <a href="https://facebook.com/"
         target="_blank"
         class="social-icon facebook-icon">

        <img src="image/facebook.png"
             alt="Facebook">

      </a>

    </div>

  </section>

  <!-- COOKIE BANNER -->

  <div id="cookie-banner">

    <div class="cookie-box">

      <p>
        Questo sito utilizza esclusivamente cookie tecnici necessari
        al corretto funzionamento della piattaforma.
      </p>

      <div class="cookie-buttons">

        <button id="accept-cookies"
                class="accept-btn">
          ✓ Accetta
        </button>

        <button id="reject-cookies"
                class="reject-btn">
          ✕ Rifiuta
        </button>

      </div>

    </div>

  </div>

  <script>

    const cookieBanner =
    document.getElementById('cookie-banner');

    const acceptBtn =
    document.getElementById('accept-cookies');

    const rejectBtn =
    document.getElementById('reject-cookies');

    if(!localStorage.getItem('cookieChoice')){

      cookieBanner.style.display = 'block';
    }

    acceptBtn.addEventListener('click', () => {

      localStorage.setItem(
        'cookieChoice',
        'accepted'
      );

      cookieBanner.style.display = 'none';
    });

    rejectBtn.addEventListener('click', () => {

      localStorage.setItem(
        'cookieChoice',
        'rejected'
      );

      cookieBanner.style.display = 'none';
    });

  </script>

</body>
</html>
