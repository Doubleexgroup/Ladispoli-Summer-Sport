<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ladispoli Summer Sport</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:#041b45;
display:flex;
align-items:center;
justify-content:center;
}

/* CONTAINER */

.container{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* POSTER */

.poster-desktop,
.poster-mobile{
user-select:none;
pointer-events:none;
}

.poster-desktop{
width:100vw;
height:100vh;
object-fit:contain;
display:block;
}

.poster-mobile{
display:none;
width:100vw;
height:100vh;
object-fit:contain;
}

/* FRECCIA */

.guest-arrow{
position:absolute;
top:61%;
left:57%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#ff6a00,#ff9800);
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
z-index:100;
box-shadow:
0 0 20px rgba(255,106,0,.6),
0 10px 30px rgba(0,0,0,.35);
transition:.3s ease;
animation:pulse 2s infinite;
}

.guest-arrow:hover{
transform:translate(-50%,-50%) scale(1.12);
box-shadow:
0 0 35px rgba(255,140,0,.9),
0 20px 45px rgba(0,0,0,.45);
}

.guest-arrow svg{
width:58px;
height:58px;
fill:white;
position:relative;
left:-5px;
}

/* SOCIAL */

.social-icon{
position:absolute;
z-index:200;
transition:.3s ease;
}

.social-icon img{
width:60px;
height:60px;
object-fit:contain;
display:block;
aspect-ratio:1/1;
filter:drop-shadow(0 0 14px rgba(255,106,0,.4));
}

.social-icon:hover{
transform:scale(1.08);
}

/* SOCIAL DESKTOP */

.instagram-icon{
bottom:-10px;
right:250px;
}

.facebook-icon{
bottom:-8px;
right:200px;
}

/* INDIRIZZO */

.location-link{
position:absolute;
bottom:18px;
left:53%;
z-index:200;
color:white;
text-decoration:none;
font-weight:700;
font-size:clamp(1.1rem,2.1vw,1.5rem);
width:320px;
text-align:center;
line-height:1.4;
white-space:nowrap;
font-family:Arial,sans-serif;
}

.desktop-address{
display:inline;
}

.mobile-address{
display:none;
}

/* ANIMAZIONE */

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.06);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* TABLET */

@media(max-width:1024px){

.guest-arrow{
width:75px;
height:75px;
}

.guest-arrow svg{
width:48px;
height:48px;
}

}

/* MOBILE */

@media(max-width:768px){

body{
overflow:hidden;
}

/* poster */

.poster-desktop{
display:none;
}

.poster-mobile{
display:block;
}

/* freccia */

.guest-arrow{
width:60px;
height:60px;
top:66%;
left:82%;
}

.guest-arrow svg{
width:36px;
height:36px;
left:-3px;
}

/* social */

.social-icon img{
width:50px;
height:50px;
}

.instagram-icon{
bottom:230px;
right:95px;
}

.facebook-icon{
bottom:230px;
right:45px;
}

/* indirizzo */

.location-link{
position:absolute;
bottom:180px;
left:25px;
width:auto;
text-align:left;
font-size:1rem;
font-weight:700;
line-height:1.35;
display:flex;
flex-direction:column;
align-items:flex-start;
}

/* gestione testo */

.desktop-address{
display:none;
}

.mobile-address{
display:block;
}

}

/* smartphone piccoli */

@media(max-width:480px){

.guest-arrow{
width:55px;
height:55px;
top:66%;
left:82%;
}

.guest-arrow svg{
width:32px;
height:32px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="image/Ladispoli corretta.png" alt="Ladispoli Summer Sport" class="poster-desktop">

<img src="image/ladispoli smart 10.png" alt="Ladispoli Summer Sport Mobile" class="poster-mobile">

<a href="gueststar.html" class="guest-arrow">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

<path d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>

</svg>

</a>

<a href="#" class="location-link">

<span class="desktop-address">
Lungomare Regina Elena 148 - Ladispoli (RM)
</span>

<span class="mobile-address">
Ladispoli<br>
Lungomare Regina Elena 148 - (RM)
</span>

</a>

<a href="https://instagram.com/" target="_blank" class="social-icon instagram-icon">

<img src="image/insta-removebg-preview.png" alt="Instagram">

</a>

<a href="https://facebook.com/" target="_blank" class="social-icon facebook-icon">

<img src="image/facebook.png" alt="Facebook">

</a>

</div>

</body>
</html>
