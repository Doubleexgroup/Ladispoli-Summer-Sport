<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Guest Star - Ladispoli Summer Sport</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:#041b45;
      color:white;
      overflow-x:hidden;
    }

    /* HEADER */

    .header{
      padding:80px 20px 40px;
      text-align:center;
    }

    .header h1{
      font-size:4rem;
      font-weight:900;
      text-transform:uppercase;
    }

    .header p{
      margin-top:15px;
      font-size:1.2rem;
      opacity:.8;
    }

    .back-home{
      display:inline-block;

      margin-top:25px;

      background:linear-gradient(90deg,#ff6a00,#ffb300);

      color:white;
      text-decoration:none;

      padding:16px 30px;

      border-radius:16px;

      font-weight:700;

      transition:.3s;
    }

    .back-home:hover{
      transform:translateY(-3px);
      opacity:.95;
    }

    /* GRID GUEST */

    .guest-container{

      width:100%;
      max-width:1400px;

      margin:auto;

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(260px,1fr));

      gap:28px;

      padding:40px 20px 80px;
    }

    /* CARD */

    .guest-card{

      background:white;
      color:#041b45;

      border-radius:28px;

      overflow:hidden;

      transition:all .35s ease;

      box-shadow:0 15px 40px rgba(0,0,0,.35);

      position:relative;
    }

    .guest-card:hover{
      transform:translateY(-10px);
      box-shadow:0 25px 50px rgba(0,0,0,.45);
    }

    /* IMMAGINE */

    .guest-image{

      width:100%;

      aspect-ratio:16/10;

      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;

      position:relative;

      background:
      radial-gradient(circle at top left,
      rgba(255,179,0,.35),
      transparent 40%),

      radial-gradient(circle at bottom right,
      rgba(255,106,0,.35),
      transparent 40%),

      linear-gradient(
      135deg,
      #041b45 0%,
      #0b2c68 45%,
      #ff6a00 100%);
    }

    .guest-image img{

      width:100%;
      height:100%;

      object-fit:contain;

      transition:transform .5s ease;

      display:block;
    }

    .guest-card:hover .guest-image img{
      transform:scale(1.08);
    }

    /* TESTI */

    .guest-info{
      padding:22px;
      text-align:center;
    }

    .guest-info h2{
      font-size:1.4rem;
      margin-bottom:10px;
      font-weight:800;
    }

    .guest-info p{
      opacity:.8;
      line-height:1.6;
      font-size:.95rem;
    }

    /* FOOTER */

    .footer{
      text-align:center;
      padding:50px 20px;
      opacity:.7;
      font-size:.95rem;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .header h1{
        font-size:2.7rem;
      }

      .guest-container{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <div class="header">

    <h1>Guest Star</h1>

    <p>
      Scopri gli ospiti speciali del Ladispoli Summer Sport
    </p>

    <a href="index.html" class="back-home">
      ← Torna alla Home
    </a>

  </div>

  <!-- GUEST -->

  <section class="guest-container">

    <!-- GUEST 1 -->

    <div class="guest-card">

      <div class="guest-image">
        <img src="image/sinner.png"
        alt="Guest Star 1"
        loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Mario Rossi</h2>

        <p>
          Campione internazionale di Beach Tennis.
        </p>
      </div>

    </div>

    <!-- GUEST 2 -->

    <div class="guest-card">

      <div class="guest-image">
        <img src="image/totti.png"
        alt="Guest Star 2"
        loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Giulio Bianchi</h2>

        <p>
          Il capitano dell’evento.
        </p>
      </div>

    </div>

    <!-- GUEST 3 -->

    <div class="guest-card">

      <div class="guest-image">
        <img src="image/madrina.png"
        alt="Guest Star 3"
        loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Eva Verdi</h2>

        <p>
          Madrina del Ladispoli Summer Sport.
        </p>
      </div>

    </div>

    <!-- AGGIUNGI QUI ALTRI GUEST -->

  </section>

  <!-- FOOTER -->

  <div class="footer">
    © 2026 Ladispoli Summer Sport - Doubleexevent
  </div>

</body>
</html>
  </div>

</body>
</html>
