<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guest Star - Ladispoli Summer Sport</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:#041b45;
      color:white;
      overflow-x:hidden;
    }

    .header{
      padding:80px 20px 40px;
      text-align:center;
    }

    .header h1{
      font-size:4rem;
      font-weight:900;
      text-transform:uppercase;
    }

    .header p{
      margin-top:15px;
      font-size:1.2rem;
      opacity:.8;
    }

    .guest-container{
      width:100%;
      max-width:1400px;
      margin:auto;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:40px;

      padding:40px 20px 80px;
    }

    .guest-card{
      background:white;
      color:#041b45;

      border-radius:28px;
      overflow:hidden;

      transition:all .35s ease;

      box-shadow:0 15px 40px rgba(0,0,0,.35);

      position:relative;
    }

    .guest-card:hover{
      transform:translateY(-12px);
      box-shadow:0 25px 50px rgba(0,0,0,.45);
    }

    /*
      CONTENITORE IMMAGINE UNIVERSALE
      Supporta qualsiasi formato immagine
    */
.guest-image{
  aspect-ratio:16/10;
}

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  padding:0;

  position:relative;

  background:
    radial-gradient(circle at top left, rgba(255,179,0,.35), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,106,0,.35), transparent 40%),
    linear-gradient(135deg,#041b45 0%, #0b2c68 45%, #ff6a00 100%);
}

.guest-image img{
  width:100%;
  height:100%;

  object-fit:cover;
  object-position:center top;

  transition:transform .4s ease;

  display:block;
}

    .guest-card:hover .guest-image img{
      transform:scale(1.06);
    }

    .guest-info{
      padding:28px;
      text-align:center;
    }

    .guest-info h2{
      font-size:1.9rem;
      margin-bottom:12px;
      font-weight:800;
    }

    .guest-info p{
      opacity:.8;
      line-height:1.7;
      font-size:1rem;
    }

    .back-home{
      display:inline-block;

      margin-top:25px;

      background:linear-gradient(90deg,#ff6a00,#ffb300);

      color:white;
      text-decoration:none;

      padding:16px 30px;

      border-radius:16px;

      font-weight:700;

      transition:0.3s;
    }

    .back-home:hover{
      transform:translateY(-3px);
      opacity:.9;
    }

    .footer{
      text-align:center;
      padding:50px 20px;
      opacity:.7;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .header h1{
        font-size:2.7rem;
      }

      .guest-image{
        height:340px;
      }

      .guest-info h2{
        font-size:1.6rem;
      }

    }

  </style>
</head>

<body>

  <div class="header">

    <h1>Guest Star</h1>

    <p>Scopri gli ospiti speciali del Ladispoli Summer Sport</p>

    <a href="index.html" class="back-home">
      ← Torna alla Home
    </a>

  </div>

  <section class="guest-container">

    <!-- PERSONAGGIO 1 -->
    <div class="guest-card">

      <div class="guest-image">
        <img src="image/sinner.png" alt="Guest Star 1" loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Mario Rossi</h2>
        <p>Campione internazionale di Beach Tennis.</p>
      </div>

    </div>

    <!-- PERSONAGGIO 2 -->
    <div class="guest-card">

      <div class="guest-image">
        <img src="image/totti.png" alt="Guest Star 2" loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Giulio Bianchi</h2>
        <p>Il capitano dell’evento.</p>
      </div>

    </div>

    <!-- PERSONAGGIO 3 -->
    <div class="guest-card">

      <div class="guest-image">
        <img src="image/madrina.png" alt="Guest Star 3" loading="lazy">
      </div>

      <div class="guest-info">
        <h2>Eva Verdi</h2>
        <p>Madrina del Ladispoli Summer Sport.</p>
      </div>

    </div>

  </section>

  <div class="footer">
    © 2026 Ladispoli Summer Sport - Doubleexevent
  </div>

</body>
</html>
